# Drop into your wger stack alongside web/nginx/oauth2-proxy.
# Same approach as wger-compose.yml: macvlan + bridge nets, env_file on NAS.
services:
  wger-mcp:
    container_name: wger-mcp
    build:
      context: ./wger-mcp
    pull_policy: build
    restart: unless-stopped
    env_file:
      - /mnt/nas/app/wger-mcp/config/wger-mcp.env
    environment:
      - TZ=Europe/Warsaw
    networks:
      wger_network:
        ipv4_address: 192.168.100.50
      internal-network:
        ipv4_address: 172.16.2.21
    # Optional: expose to LAN via macvlan. Otherwise reach via nginx upstream.
    # If you front it with nginx, add a server block proxying to wger-mcp:8765.
    # ports:
    #   - "8765:8765"

